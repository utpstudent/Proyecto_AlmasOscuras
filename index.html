<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almas Oscuras</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="screen-splash">

  <canvas id="particles-canvas"></canvas>

  <div class="splash-container">
    <h1 class="game-title">Almas Oscuras</h1>
    <p class="lore-text">Donde la luz se apaga, las almas despiertan</p>
    <div class="title-divider"></div>
    <p class="press-prompt">— Presiona cualquier tecla para continuar —</p>
  </div>

  <audio id="bg-music" loop>
    <source src="assets/audio/soundtrack.mp3" type="audio/mpeg" />
  </audio>

  <script>
    // ── Partículas ──
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function randomParticle() {
      return {
        x:       Math.random() * canvas.width,
        y:       Math.random() * canvas.height,
        size:    Math.random() * 2 + 0.5,
        speedY:  Math.random() * 0.4 + 0.1,
        speedX:  (Math.random() - 0.5) * 0.3,
        opacity: Math.random() * 0.5 + 0.1
      };
    }

    for (let i = 0; i < 80; i++) particles.push(randomParticle());

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${p.opacity})`;
        ctx.fill();
        p.y -= p.speedY;
        p.x += p.speedX;
        if (p.y < -5) { p.y = canvas.height + 5; p.x = Math.random() * canvas.width; }
      });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // ── Navegación + audio ──
    const music = document.getElementById('bg-music');

    function startAndGo() {
      music.volume = 0.5;
      music.play().catch(() => {});
      setTimeout(() => { window.location.href = 'menu.html'; }, 300);
    }

    document.addEventListener('keydown', startAndGo);
    document.addEventListener('click',   startAndGo);
  </script>

</body>
</html>
