<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almas Oscuras — Menú</title>
  <link rel="stylesheet" href="style.css" />
  
</head>
<body class="screen-menu">

  <canvas id="particles-canvas"></canvas>

  <div class="menu-container">
    <div class="gothic-frame">
      <span class="corner tl">✦</span>
      <span class="corner tr">✦</span>
      <span class="corner bl">✦</span>
      <span class="corner br">✦</span>

      <!-- Vista: Menú principal -->
      <div id="view-main" class="view active">
        <h1 class="game-title small">Almas Oscuras</h1>
        <div class="title-divider"></div>
        <button class="menu-btn" onclick="showView('player1')">Nuevo Juego</button>
        <button class="menu-btn" onclick="showView('credits')">Créditos</button>
      </div>

      <!-- Vista: Jugador 1 -->
      <div id="view-player1" class="view">
        <button class="back-btn" onclick="showView('main')">&#8592; Volver</button>
        <p class="chars-label" style="font-size:0.85rem; color:#aaa; margin-bottom:1rem;">— Jugador 1 —</p>
        <label class="field-label">Nickname</label>
        <input id="p1-nickname" class="text-input" type="text" placeholder="Ingresa tu nombre..." maxlength="20" />
        <p class="chars-label">Elige tu personaje</p>
        <div class="chars-grid">
          <div class="char-card selected" onclick="selectChar(this, 'p1')" data-id="knight">
            <div class="char-icon knight"></div>
            <span class="char-name">Knight</span>
          </div>
          <div class="char-card" onclick="selectChar(this, 'p1')" data-id="fire_wizard">
            <div class="char-icon fire_wizard"></div>
            <span class="char-name">Fire Wizard</span>
          </div>
          <div class="char-card" onclick="selectChar(this, 'p1')" data-id="lightning_mage">
            <div class="char-icon lightning_mage"></div>
            <span class="char-name">Lightning Mage</span>
          </div>
          <div class="char-card" onclick="selectChar(this, 'p1')" data-id="wanderer_magician">
            <div class="char-icon wanderer_magician"></div>
            <span class="char-name">Wanderer</span>
          </div>
        </div>
        <button class="menu-btn" style="margin-top:1.5rem;" onclick="goToPlayer2()">Siguiente ›</button>
      </div>

      <!-- Vista: Jugador 2 -->
      <div id="view-player2" class="view">
        <button class="back-btn" onclick="showView('player1')">&#8592; Volver</button>
        <p class="chars-label" style="font-size:0.85rem; color:#aaa; margin-bottom:1rem;">— Jugador 2 —</p>
        <label class="field-label">Nickname</label>
        <input id="p2-nickname" class="text-input" type="text" placeholder="Ingresa tu nombre..." maxlength="20" />
        <p class="chars-label">Elige tu personaje</p>
        <div class="chars-grid">
          <div class="char-card selected" onclick="selectChar(this, 'p2')" data-id="knight">
            <div class="char-icon knight"></div>
            <span class="char-name">Knight</span>
          </div>
          <div class="char-card" onclick="selectChar(this, 'p2')" data-id="fire_wizard">
            <div class="char-icon fire_wizard"></div>
            <span class="char-name">Fire Wizard</span>
          </div>
          <div class="char-card" onclick="selectChar(this, 'p2')" data-id="lightning_mage">
            <div class="char-icon lightning_mage"></div>
            <span class="char-name">Lightning Mage</span>
          </div>
          <div class="char-card" onclick="selectChar(this, 'p2')" data-id="wanderer_magician">
            <div class="char-icon wanderer_magician"></div>
            <span class="char-name">Wanderer</span>
          </div>
        </div>
        <button class="menu-btn" style="margin-top:1.5rem;" onclick="startGame()">⚔ Combatir</button>
      </div>

      <!-- Vista: Créditos -->
      <div id="view-credits" class="view">
        <button class="back-btn" onclick="showView('main')">&#8592; Volver</button>
        <div class="credits-box">
          <p class="credits-heading">Desarrolladores</p>
          <p class="credit-name">Lopez, Neyshany</p>
          <p class="credit-name">Martinez, Miguel</p>
          <p class="credit-name">Mendoza, Jorge</p>
          <p class="credit-name">Torres, Martin</p>
        </div>
      </div>

    </div>
  </div>

  <audio id="bg-music" loop autoplay>
    <source src="assets/audio/soundtrack.mp3" type="audio/mpeg" />
  </audio>

  <script>
    // ── Partículas (igual que index.html) ──
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function randomParticle() {
      return {
        x:       Math.random() * canvas.width,
        y:       Math.random() * canvas.height,
        size:    Math.random() * 2 + 0.5,
        speedY:  Math.random() * 0.4 + 0.1,
        speedX:  (Math.random() - 0.5) * 0.3,
        opacity: Math.random() * 0.5 + 0.1
      };
    }

    for (let i = 0; i < 80; i++) particles.push(randomParticle());

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${p.opacity})`;
        ctx.fill();
        p.y -= p.speedY;
        p.x += p.speedX;
        if (p.y < -5) { p.y = canvas.height + 5; p.x = Math.random() * canvas.width; }
      });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // ── Audio ──
    const music = document.getElementById('bg-music');
    music.volume = 0.5;
    music.play().catch(() => {});

    // ── Selección de personajes ──
    let p1Selected = 'knight';
    let p2Selected = 'knight';

    function showView(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + id).classList.add('active');
    }

    function selectChar(el, player) {
      el.closest('.chars-grid').querySelectorAll('.char-card')
        .forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      if (player === 'p1') p1Selected = el.dataset.id;
      if (player === 'p2') p2Selected = el.dataset.id;
    }

    function goToPlayer2() {
      const nickname = document.getElementById('p1-nickname').value.trim();
      if (!nickname) { alert('Ingresa un nickname para el Jugador 1.'); return; }
      showView('player2');
    }

    function startGame() {
      const p1Nick = document.getElementById('p1-nickname').value.trim();
      const p2Nick = document.getElementById('p2-nickname').value.trim();
      if (!p2Nick) { alert('Ingresa un nickname para el Jugador 2.'); return; }

      // Mandar los datos en la URL para que PHP los lea con $_GET
      window.location.href = 'combat.php'
        + '?p1_nick=' + encodeURIComponent(p1Nick)
        + '&p1_char=' + p1Selected
        + '&p2_nick=' + encodeURIComponent(p2Nick)
        + '&p2_char=' + p2Selected;
    }
  </script>

</body>
</html>
